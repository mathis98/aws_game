stages:
  - build
  - deploy

variables:
  AWS_DEFAULT_REGION: eu-central-1
  BUCKET_NAME: serverless-game-gitlab-build

buildNpm:
  image: node:10-alpine
  stage: build
  cache:
    key: ${CI_JOB_NAME}
    paths:
    - node_modules/
  before_script:
    - npm install
  script:
    - export BRANCH_NAME=${CI_COMMIT_REF_SLUG}
    - npm run build
  artifacts:
    paths:
      - dist/

deployS3NotMaster:
  image: python:3.7-alpine3.9
  stage: deploy
  cache:
    key: deployS3v1
    paths:
    - .cache/
  dependencies:
    - buildNpm
  before_script:
    - cp .cache/ /usr/local/lib/python3.7/site-packages/
    - pip install awscli
    - cp /usr/local/lib/python3.7/site-packages/ .cache/
  script:
    - aws s3 cp dist s3://${BUCKET_NAME}/${CI_COMMIT_SHA} --recursive
  environment:
    name: ${CI_COMMIT_SHA}
    url: https://slsgame.janbe.eu/${CI_COMMIT_SHA}
  except:
    - master

deployS3OnlyMaster:
  image: python:3.7-alpine3.9
  stage: deploy
  cache:
    key: deployS3v1
    paths:
    - .cache/
  dependencies:
    - buildNpm
  before_script:
    - cp .cache/ /usr/local/lib/python3.7/site-packages/
    - pip install awscli
    - cp /usr/local/lib/python3.7/site-packages/ .cache/
  script:
    - aws s3 cp dist s3://${BUCKET_NAME} --recursive
    - aws cloudfront create-invalidation --distribution-id E200JT0ASF5PL9 --paths "/*"
  environment:
    name: ${CI_COMMIT_REF_SLUG}
    url: https://slsgame.janbe.eu/
  only:
    - master
